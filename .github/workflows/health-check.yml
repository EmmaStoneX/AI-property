name: Service Health Check

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install chromium > /dev/null 2>&1

      - name: Check all services with real browser
        run: |
          node << 'SCRIPT'
          const { chromium } = require('playwright');

          // domain key -> actual check URL
          const services = {
            "ai.zxvmax.com": "https://ai.zxvmax.com",
            "api.zxvmax.com": "https://api.zxvmax.com",
            "chat.zxvmax.com": "https://chat.zxvmax.com",
            "deep-research.zxvmax.com": "https://deep-research.zxvmax.com",
            "dify.zxvmax.com": "https://dify.zxvmax.com",
            "img.zxvmax.com": "https://img.zxvmax.com",
            "nano-kit.zxvmax.com": "https://nano-kit.zxvmax.com",
            "netpulse.zxvmax.com": "https://netpulse.zxvmax.com",
            "ui-prompt.zxvmax.com": "https://ui-prompt.zxvmax.com",
            "waoo.zxvmax.com": "https://waoo.zxvmax.com",
            "backend-ai.zxvmax.com": "https://backend-ai.zxvmax.com",
            "claude.zxvmax.com": "https://claude.zxvmax.com",
            "grok.zxvmax.com": "https://grok.zxvmax.com",
            "grok2api.zxvmax.com": "https://grok.zxvmax.com/lyy0709",
            "kagi2api.zxvmax.com": "https://kagi2api.zxvmax.com",
            "cpa.zxvmax.com": "https://cpa.zxvmax.site/management.html"
          };

          (async () => {
            const browser = await chromium.launch();
            const results = {};

            for (const [domain, checkUrl] of Object.entries(services)) {
              let status = 'down';
              let httpCode = 0;
              try {
                const context = await browser.newContext();
                const page = await context.newPage();
                const response = await page.goto(checkUrl, {
                  waitUntil: 'domcontentloaded',
                  timeout: 30000
                });
                httpCode = response ? response.status() : 0;
                // up = 页面成功加载且不是 5xx
                if (httpCode > 0 && httpCode < 500) {
                  status = 'up';
                }
                await context.close();
              } catch (e) {
                status = 'down';
                httpCode = 0;
              }
              results[domain] = { status, httpCode };
              console.log(domain + ' (' + checkUrl + ') -> ' + httpCode + ' (' + status + ')');
            }

            await browser.close();

            const output = {
              lastChecked: new Date().toISOString(),
              services: results
            };

            require('fs').writeFileSync('status.json', JSON.stringify(output, null, 2));
            console.log('\nstatus.json written');
          })();
          SCRIPT

      - name: Commit and push status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || (git commit -m "chore: update service health status" && git push)

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name ai-property --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
